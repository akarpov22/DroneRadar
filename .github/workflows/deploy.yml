name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy-backend:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  deploy-frontend:
    name: Deploy frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    environment: env
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GRAPHQL_HTTP: ${{ secrets.VITE_GRAPHQL_HTTP }}
          VITE_GRAPHQL_WS: ${{ secrets.VITE_GRAPHQL_WS }}
          VITE_AUTH0_DISABLED: ${{ secrets.VITE_AUTH0_DISABLED }}
          VITE_AUTH0_DOMAIN: ${{ secrets.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.VITE_AUTH0_AUDIENCE }}
        run: |
          if [ -n "$VITE_API_BASE_URL" ]; then
            BASE="${VITE_API_BASE_URL%/}"
            case "$BASE" in
              https://*) ;;
              *) echo "VITE_API_BASE_URL must start with https://"; exit 1 ;;
            esac
            export VITE_GRAPHQL_HTTP="${BASE}/graphql"
            export VITE_GRAPHQL_WS="${VITE_GRAPHQL_HTTP/https/wss}"
          else
            case "$VITE_GRAPHQL_HTTP" in
              https://*) ;;
              *) echo "VITE_GRAPHQL_HTTP must start with https://"; exit 1 ;;
            esac
            case "$VITE_GRAPHQL_WS" in
              wss://*) ;;
              *) echo "VITE_GRAPHQL_WS must start with wss://"; exit 1 ;;
            esac
          fi
          npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: frontend/dist
          branch: ${{ github.ref_name }}
