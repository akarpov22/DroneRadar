services:
  postgres:
    image: postgres:15
    container_name: drone-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: dronetracker
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d dronetracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: drone-tracker-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data

  backend:
    build:
      context: ./backend
    container_name: drone-tracker-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://devuser:devpass@postgres:5432/dronetracker?schema=public
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_TOPIC: droneradar/telemetry/#
      MQTT_CLIENT_ID: droneradar-backend
      AUTH0_DISABLED: ${AUTH0_DISABLED:-true}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      FLIGHT_ZONE_SYNC_INTERVAL_MS: ${FLIGHT_ZONE_SYNC_INTERVAL_MS:-21600000}
      FLIGHT_ZONE_SYNC_ON_START: ${FLIGHT_ZONE_SYNC_ON_START:-true}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GRAPHQL_HTTP: http://localhost:4000/graphql
        VITE_GRAPHQL_WS: ws://localhost:4000/graphql
        VITE_AUTH0_DISABLED: ${VITE_AUTH0_DISABLED:-true}
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE:-}
    container_name: drone-tracker-frontend
    restart: unless-stopped
    ports:
      - "3000:4173"
    depends_on:
      - backend

  simulator:
    build:
      context: ./simulator
    container_name: drone-tracker-simulator
    restart: unless-stopped
    environment:
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      DRONE_SERIAL: ${DRONE_SERIAL:-7777MYDRONE7}
      REGION_CODE: ${REGION_CODE:-SE}
    depends_on:
      - mosquitto

volumes:
  postgres-data:
  mosquitto-data:
