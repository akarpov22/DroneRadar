type Query {
  me: User
  drones: [Drone!]!
  myDrones: [Drone!]!
  drone(id: ID!): Drone!
  droneModels(activeOnly: Boolean = true): [DroneModel!]!
  droneModel(id: ID!): DroneModel!
  droneSessions: [DroneSession!]!
  droneSession(id: ID!): DroneSession!
  operators: [Operator!]!
  operator(id: ID!): Operator!
  positions: [Position!]!
  position(id: ID!): Position!
  regions(activeOnly: Boolean = true): [Region!]!
  region(id: ID!): Region!
  flightRestrictionZones(
    west: Float!
    south: Float!
    east: Float!
    north: Float!
    includeNotam: Boolean
  ): [FlightRestrictionZone!]!
  userZones: [UserZone!]!
  users(search: String): [User!]!
  droneNotifications(limit: Int = 50): [DroneNotification!]!
}