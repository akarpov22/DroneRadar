persistence true
persistence_location /mosquitto/persist/data/
log_dest stdout

# Drones — plain MQTT :1883 (anonymous; Fly dedicated IPv4)
listener 1883 0.0.0.0
listener_allow_anonymous true

# Backend — MQTTS :8883 (TLS + username/password)
listener 8883 0.0.0.0
cafile /mosquitto/persist/certs/ca.crt
certfile /mosquitto/persist/certs/server.crt
keyfile /mosquitto/persist/certs/server.key
require_certificate false
listener_allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl
