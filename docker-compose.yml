services:
  postgres:
    image: postgres:15
    container_name: drone-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: dronetracker
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d dronetracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: drone-tracker-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://devuser:devpass@postgres:5432/dronetracker?schema=public
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GRAPHQL_HTTP: http://localhost:4000/graphql
        VITE_GRAPHQL_WS: ws://localhost:4000/graphql
    container_name: drone-tracker-frontend
    restart: unless-stopped
    ports:
      - "3000:4173"
    depends_on:
      - backend

  simulator:
    build:
      context: ./simulator
    container_name: drone-tracker-simulator
    restart: unless-stopped
    environment:
      GRAPHQL_URL: http://backend:4000/graphql
      DRONE_SERIAL: 7777MYDRONE7
      REGION_ID: UA-KY
    depends_on:
      - backend

volumes:
  postgres-data:
